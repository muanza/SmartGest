<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Produtos - SmartGest</title>
</h:head>
<h:body>
<h1>Gestão de Produtos</h1>
<h:link outcome="/index.xhtml" value="Voltar ao início"/>
<h:messages globalOnly="true"/>

<h:form>
    <h3>Cadastro</h3>
    <h:panelGrid columns="2">
        <h:outputLabel for="codigo" value="Código"/>
        <h:inputText id="codigo" value="#{produtoBean.produto.codigo}" required="true"/>

        <h:outputLabel for="descricao" value="Descrição"/>
        <h:inputText id="descricao" value="#{produtoBean.produto.descricao}" required="true"/>

        <h:outputLabel for="categoria" value="Categoria"/>
        <h:selectOneMenu id="categoria" value="#{produtoBean.categoriaId}">
            <f:selectItems value="#{produtoBean.categorias}" var="categoria"
                           itemValue="#{categoria.id}" itemLabel="#{categoria.nome}"/>
        </h:selectOneMenu>

        <h:outputLabel for="preco" value="Preço"/>
        <h:inputText id="preco" value="#{produtoBean.produto.preco}" required="true"/>

        <h:outputLabel for="ativo" value="Ativo"/>
        <h:selectBooleanCheckbox id="ativo" value="#{produtoBean.produto.ativo}"/>
    </h:panelGrid>

    <h:commandButton value="Novo" action="#{produtoBean.prepareNew}"/>
    <h:commandButton value="Guardar" action="#{produtoBean.save}"/>
</h:form>

<h:form>
    <h3>Registos</h3>
    <h:dataTable value="#{produtoBean.produtos}" var="item" border="1">
        <h:column>
            <f:facet name="header">Código</f:facet>
            #{item.codigo}
        </h:column>
        <h:column>
            <f:facet name="header">Descrição</f:facet>
            #{item.descricao}
        </h:column>
        <h:column>
            <f:facet name="header">Categoria</f:facet>
            #{item.categoria.nome}
        </h:column>
        <h:column>
            <f:facet name="header">Preço</f:facet>
            #{item.preco}
        </h:column>
        <h:column>
            <f:facet name="header">Ações</f:facet>
            <h:commandButton value="Editar" action="#{produtoBean.edit(item.id)}"/>
            <h:commandButton value="Remover" action="#{produtoBean.delete(item.id)}"/>
        </h:column>
    </h:dataTable>
</h:form>
</h:body>
</html>
