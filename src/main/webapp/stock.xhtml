<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Stock - SmartGest</title>
</h:head>
<h:body>
<h1>Gestão de Stock</h1>
<h:link outcome="/index.xhtml" value="Voltar ao início"/>

<h:dataTable value="#{stockDashboardBean.alerts}" var="item" border="1">
    <h:column>
        <f:facet name="header">Código</f:facet>
        #{item.codigoProduto}
    </h:column>
    <h:column>
        <f:facet name="header">Descrição</f:facet>
        #{item.descricao}
    </h:column>
    <h:column>
        <f:facet name="header">Qtd actual</f:facet>
        #{item.quantidadeAtual}
    </h:column>
    <h:column>
        <f:facet name="header">Qtd mínima</f:facet>
        #{item.quantidadeMinima}
    </h:column>
    <h:column>
        <f:facet name="header">Estado</f:facet>
        #{item.estado}
    </h:column>
</h:dataTable>
</h:body>
</html>
